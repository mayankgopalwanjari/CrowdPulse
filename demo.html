<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrowdPulse Live Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: "#0F1115",
                        panel: "#171A21",
                        primary: "#00E5FF",
                        green: "#00FF88",
                        yellow: "#FFB800",
                        red: "#FF3366"
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <style>
        body { background-color: #0F1115; color: white; font-family: sans-serif; overflow-x: hidden; margin: 0; }
        .glass-card { background: rgba(23, 26, 33, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }
        .neon-primary { text-shadow: 0 0 10px #00E5FF; }
        @keyframes pulse-fast { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-fast { animation: pulse-fast 1s infinite; }
        .animate-glow { animation: glow 2s ease-in-out infinite alternate; }
        @keyframes glow { 0% { box-shadow: 0 0 10px #00E5FF, 0 0 20px #00E5FF; } 100% { box-shadow: 0 0 20px #00E5FF, 0 0 30px #00E5FF; } }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0F1115; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONS (SVG inline) ---
        const MapPin = () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>;
        const Alert = () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>;
        const Shield = () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></svg>;
        const Activity = () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>;
        const Nav = () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" /></svg>;
        
        function App() {
            // Global State shared between "Admin" and "Attendee" view for the perfect single-page demo
            const [emergency, setEmergency] = useState(false);
            const [spike, setSpike] = useState(false);
            const [gates, setGates] = useState({
                A: { wait: 15, flow: 450 },
                B: { wait: 5, flow: 120 },
                C: { wait: 22, flow: 800 },
                D: { wait: 12, flow: 320 }
            });

            // Simulation loop
            useEffect(() => {
                const timer = setInterval(() => {
                    if(!spike) {
                        setGates(prev => ({
                            A: { ...prev.A, wait: Math.max(1, prev.A.wait + (Math.random() > 0.5 ? 1 : -1)) },
                            B: { ...prev.B, wait: Math.max(1, prev.B.wait + (Math.random() > 0.5 ? 1 : -1)) },
                            C: { ...prev.C, wait: Math.max(1, prev.C.wait + (Math.random() > 0.5 ? 1 : -1)) },
                            D: { ...prev.D, wait: Math.max(1, prev.D.wait + (Math.random() > 0.5 ? 1 : -1)) },
                        }));
                    }
                }, 3000);
                return () => clearInterval(timer);
            }, [spike]);

            const triggerSpike = () => {
                setSpike(true);
                setGates(prev => ({
                    ...prev,
                    C: { wait: 45, flow: 1500 }
                }));
                setTimeout(() => {
                    setSpike(false);
                    setGates(prev => ({ ...prev, C: { wait: 25, flow: 850 } }));
                }, 10000);
            };

            const bestGate = spike ? 'B' : (gates.C.wait > 30 ? 'B' : 'B'); // Simplistic logic for demo

            return (
                <div className="flex h-screen bg-dark">
                    {/* LEFT PANEL: ADMIN DASHBOARD */}
                    <div className={`w-2/3 border-r border-white/10 p-6 flex flex-col transition-colors duration-500 ${emergency ? 'bg-red-950/30' : ''}`}>
                        
                        {/* Admin Header */}
                        <div className="glass-card rounded-2xl p-6 mb-6 flex justify-between items-center bg-panel">
                            <div className="flex items-center gap-3">
                                <Activity />
                                <h1 className="text-2xl font-bold tracking-wider">CROWD<span className="text-primary">PULSE</span> ADMIN</h1>
                            </div>
                            <div className="flex items-center gap-4">
                                <button onClick={() => setEmergency(!emergency)} className={`px-6 py-2 rounded-xl font-bold flex items-center gap-2 transition ${emergency ? 'bg-red-500 text-white animate-pulse' : 'bg-red-500/20 text-red-500 border border-red-500 hover:bg-red-500/40'}`}>
                                    <Shield /> {emergency ? 'EMERGENCY ACTIVE - DISABLE' : 'TRIGGER EVACUATION'}
                                </button>
                                <button onClick={triggerSpike} className={`px-6 py-2 rounded-xl font-bold flex items-center gap-2 transition ${spike ? 'bg-yellow text-dark' : 'bg-yellow/20 text-yellow border border-yellow hover:bg-yellow/40'}`}>
                                    <Alert /> {spike ? 'SPIKE ACTIVE' : 'SIMULATE SPIKE'}
                                </button>
                            </div>
                        </div>

                        {/* Admin Content Grid */}
                        <div className="flex-1 grid grid-cols-2 gap-6 relative">
                            {/* Stats */}
                            <div className="space-y-6">
                                <div className={`glass-card p-6 rounded-2xl transition border ${spike ? 'border-red-500 shadow-[0_0_20px_rgba(255,51,102,0.5)]' : 'border-white/10'}`}>
                                    <h3 className="text-gray-400 text-sm font-semibold mb-2">AI Risk Score (Anomaly)</h3>
                                    <div className={`text-5xl font-black ${spike ? 'text-red' : 'text-primary'}`}>
                                        {spike ? '92' : '24'}
                                    </div>
                                    <div className="text-sm mt-2">{spike ? 'CRITICAL BOTTLENECK DETECTED AT GATE C' : 'Flow rates nominal.'}</div>
                                </div>
                                <div className="glass-card p-6 rounded-2xl">
                                    <h3 className="text-gray-400 text-sm font-semibold mb-4">Live Gate Queues</h3>
                                    {Object.entries(gates).map(([gateId, data]) => (
                                        <div key={gateId} className="flex justify-between items-center mb-3 p-2 bg-white/5 rounded">
                                            <div className="font-bold flex items-center gap-3">
                                                <div className="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">{gateId}</div>
                                                <span className="text-sm text-gray-300">{data.flow} pax/hr</span>
                                            </div>
                                            <div className={`font-mono text-xl font-bold ${data.wait > 25 ? 'text-red' : data.wait > 10 ? 'text-yellow' : 'text-green'}`}>
                                                {data.wait}m
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            
                            {/* Map View */}
                            <div className="glass-card rounded-2xl relative overflow-hidden bg-panel border border-white/5">
                                <div className="p-4 bg-black/40 flex justify-between items-center">
                                    <div className="font-semibold flex items-center gap-2"><MapPin /> Venue Density Map</div>
                                </div>
                                <div className="absolute inset-0 top-14 bg-gradient-to-b from-[#1a202c] to-[#0f1115] mix-blend-screen opacity-80 flex items-center justify-center">
                                    {/* Mock Stadium Graphic */}
                                    <div className="w-64 h-64 border-4 border-white/10 rounded-full flex items-center justify-center relative">
                                        <div className="w-32 h-32 border border-white/5 rounded-full"></div>
                                        {/* Heatmap Nodes */}
                                        <div className={`absolute top-10 left-10 w-20 h-20 rounded-full blur-[20px] transition-all duration-1000 ${spike ? 'bg-red text-red-500 scale-150 shadow-[0_0_50px_#FF3366]' : 'bg-primary/40'}`}></div>
                                        <div className="absolute bottom-10 right-10 w-16 h-16 rounded-full blur-[15px] bg-green/40"></div>
                                    </div>
                                </div>
                                {emergency && (
                                    <div className="absolute inset-0 bg-red-500/20 mix-blend-multiply flex items-center justify-center pointer-events-none">
                                        <div className="text-red-500 font-black text-5xl opacity-50 rotate-[-15deg] tracking-widest border-4 border-red-500 p-4">EVACUATE</div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* RIGHT PANEL: ATTENDEE MOBILE VIEW */}
                    <div className="w-1/3 p-6 flex items-center justify-center relative shadow-[-10px_0_30px_rgba(0,0,0,0.5)] z-10 bg-black">
                        {/* Phone Mockup Frame */}
                        <div className="w-[375px] h-[812px] bg-dark rounded-[3rem] border-8 border-gray-800 relative overflow-hidden flex flex-col shadow-2xl">
                            
                            {/* iPhone notch */}
                            <div className="absolute top-0 inset-x-0 h-6 bg-black rounded-b-3xl w-1/2 mx-auto z-50"></div>

                            {/* App Content */}
                            {emergency ? (
                                <div className="flex-1 bg-red-900 flex flex-col items-center justify-center p-6 text-center animate-pulse-fast">
                                    <Shield />
                                    <h1 className="text-4xl font-black text-white mt-4 tracking-widest">EMERGENCY</h1>
                                    <p className="text-xl text-red-100 font-semibold mt-4">Evacuation triggered. Follow the glowing path to GATE D.</p>
                                </div>
                            ) : (
                                <div className="flex-1 flex flex-col relative">
                                    {/* App Header */}
                                    <div className="p-6 pt-12 pb-4 glass-card shadow-md z-20">
                                        <h1 className="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary to-green">CrowdPulse</h1>
                                        <p className="text-xs text-gray-400">Section 4 • Row G • Seat 12</p>
                                    </div>

                                    {/* App Body */}
                                    <div className="p-4 flex-1 space-y-4 overflow-y-auto pb-24 z-10">
                                        <div className="glass-card rounded-2xl p-5 relative overflow-hidden">
                                            <div className="absolute top-[-20%] right-[-10%] w-24 h-24 bg-primary/20 rounded-full blur-xl"></div>
                                            <h2 className="text-sm font-semibold text-gray-200">Recommended Entrance</h2>
                                            <h3 className="text-4xl font-black text-primary mt-1 neon-primary">Gate {bestGate}</h3>
                                            <div className="mt-2 inline-block bg-green/20 border border-green/30 text-green px-3 py-1 rounded-full text-xs font-bold">
                                                {gates[bestGate].wait} min wait
                                            </div>
                                            {spike && <p className="text-xs text-red mt-3">Rerouted proactively to avoid Concourse 2 crowd spike!</p>}
                                        </div>

                                        <div className="glass-card rounded-2xl p-4 h-48 relative flex flex-col">
                                            <h3 className="text-gray-300 text-sm mb-2 z-10 flex items-center gap-1 font-semibold"><Nav /> Smart Path Active</h3>
                                            <div className="absolute inset-0 top-10 flex items-center justify-center pointer-events-none opacity-60">
                                                <svg width="100%" height="100%" className="drop-shadow-[0_0_8px_rgba(0,229,255,0.8)]">
                                                    <path d="M 50 100 Q 100 50 200 100" fill="none" stroke={spike ? "#FF3366" : "#00E5FF"} strokeWidth="4" strokeDasharray="8 8" className="animate-pulse-fast" />
                                                </svg>
                                            </div>
                                        </div>

                                        <div className="glass-card rounded-xl p-4 bg-gradient-to-r from-gray-900 to-indigo-900/40">
                                            <h4 className="font-bold text-gray-200 text-sm">Flow Hero Badge</h4>
                                            <p className="text-xs text-gray-400 mt-1">Use Gate B today to earn +50 CrowdCoins.</p>
                                        </div>
                                    </div>

                                    {/* Bottom Nav */}
                                    <div className="absolute bottom-0 w-full glass-card border-t border-white/10 flex justify-around p-4 z-20 pb-8">
                                        <div className="text-primary flex flex-col items-center"><Nav /><span className="text-[10px]">Route</span></div>
                                        <div className="text-gray-500 flex flex-col items-center"><Alert /><span className="text-[10px]">SOS</span></div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
